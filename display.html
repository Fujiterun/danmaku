<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弾幕ディスプレイ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }
  #screen { width: 100%; height: 100%; position: relative; overflow: hidden; }
  #session-label { position: fixed; top: 18px; left: 24px; z-index: 20; display: flex; flex-direction: column; gap: 4px; }
  #session-name  { font-size: 2.1rem; font-weight: 700; letter-spacing: 0.08em; }
  #event-name    { font-size: 1.5rem; letter-spacing: 0.06em; opacity: 0.5; }
  #stats { position: fixed; top: 18px; right: 24px; z-index: 20; font-size: 0.72rem; opacity: 0.25; letter-spacing: 0.05em; }
  #description-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 10px 24px; background: rgba(0,0,0,0.45);
    font-size: 0.9rem; letter-spacing: 0.05em; opacity: 0.85; display: none;
  }
  #qr-box { position: fixed; bottom: 20px; right: 20px; z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.85; }
  #qr-label { font-size: 0.7rem; letter-spacing: 0.06em; text-align: center; opacity: 0.6; }
  .danmaku {
    position: absolute; white-space: pre; font-weight: 700; pointer-events: none;
    will-change: transform; text-shadow: 2px 2px 6px rgba(0,0,0,0.85); line-height: 1.4;
  }
  .danmaku.is-question { border-bottom: 2px solid #fbbf24; padding-bottom: 2px; }
  .danmaku.is-agree { color: #86efac !important; }
  #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.9rem; opacity: 0.3; }
</style>
</head>
<body>
<div id="screen"></div>
<div id="session-label">
  <span id="session-name"></span>
  <span id="event-name"></span>
</div>
<div id="stats">0 コメント</div>
<div id="description-bar"></div>
<div id="qr-box">
  <div id="qr-canvas"></div>
  <div id="qr-label">投稿はこちら</div>
</div>
<div id="loading">読み込み中...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const SUPABASE_URL = 'https://izlcztrxwzyqgvbinugd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ASIIOGkT9W55Ts8vo-HFkQ_dnqxpo3S';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params    = new URLSearchParams(window.location.search);
const sessionId = params.get('id') || 'default';

async function init() {
  const { data } = await client.from('sessions').select('*').eq('id', sessionId).single();
  document.getElementById('loading').style.display = 'none';

  let cfg = { session_name: sessionId, event_name: '', description: '', bg_color: '#000000', fg_color: '#ffffff', speed: 1 };
  if (data) cfg = { ...cfg, ...data };

  const fgColor = cfg.fg_color || '#ffffff';
  const bgColor = cfg.bg_color || '#000000';
  const speed   = parseFloat(cfg.speed) || 1;

  document.body.style.background = bgColor;
  document.getElementById('session-name').textContent = cfg.session_name || sessionId;
  document.getElementById('session-name').style.color = fgColor;
  document.getElementById('stats').style.color = fgColor;

  if (cfg.event_name) {
    const el = document.getElementById('event-name');
    el.textContent = cfg.event_name;
    el.style.color = fgColor;
  }
  if (cfg.description) {
    const bar = document.getElementById('description-bar');
    bar.style.color = fgColor;
    bar.style.display = 'block';
    // 改行を<br>に変換（textContentでHTMLは無効化）
    bar.innerHTML = cfg.description
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }
  document.getElementById('qr-label').style.color = fgColor;

  const postUrl = location.href.replace('display.html', 'post.html').replace(/\?.*/, '') + '?id=' + encodeURIComponent(sessionId);
  new QRCode(document.getElementById('qr-canvas'), {
    text: postUrl, width: 180, height: 180,
    colorDark: fgColor, colorLight: '#00000000'
  });

  startRealtime(sessionId, fgColor, speed);
}

function startRealtime(sessionId, fgColor, speed) {
  const screen = document.getElementById('screen');
  const stats  = document.getElementById('stats');
  let count = 0;
  const TRACKS = 20;
  const trackLastEnd = new Array(TRACKS).fill(0);

  function getTrackY(i) {
    const topMargin = 160;
    const bottomMargin = 220;
    const usableHeight = screen.offsetHeight - topMargin - bottomMargin;
    // 20本を均等配置。偶数インデックス(0,2,4...)が1,2,3...番、奇数インデックス(1,3,5...)がその中間
    const halfTracks = TRACKS / 2;
    const trackSpacing = usableHeight / halfTracks;
    const trackIndex = Math.floor(i / 2);
    const offset = (i % 2 === 1) ? Math.round(trackSpacing / 2) : 0;
    return topMargin + Math.round(trackSpacing * trackIndex) + offset;
  }

  function pickTrack() {
    let track = 0, earliest = Infinity;
    for (let i = 0; i < TRACKS; i++) {
      if (trackLastEnd[i] < earliest) { earliest = trackLastEnd[i]; track = i; }
    }
    return track;
  }

  function scrollElement(el, track, speedMult) {
    document.body.appendChild(el);
    const w = el.offsetWidth;
    document.body.removeChild(el);
    const effectiveSpeed = speed * (speedMult || 1);
    const duration = (12 / effectiveSpeed) + Math.random() * (3 / effectiveSpeed);
    trackLastEnd[track] = Date.now() + duration * 1000;
    el.style.top = getTrackY(track) + 'px';
    el.style.left = screen.offsetWidth + 'px';
    el.style.transition = `transform ${duration}s linear`;
    screen.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translateX(${-(screen.offsetWidth + w + 100)}px)`;
    }));
    setTimeout(() => el.remove(), (duration + 1) * 1000);
  }

  function launch(text, isQuestion) {
    const el = document.createElement('div');
    el.className = 'danmaku' + (isQuestion ? ' is-question' : '');
    el.textContent = (isQuestion ? '❓ ' : '') + text;
    el.style.color = isQuestion ? '#fb923c' : fgColor;
    el.style.fontSize = '2.2rem';
    scrollElement(el, pickTrack(), 1);
    count++;
    stats.textContent = count + ' コメント';
  }

  function launchReaction(displayText) {
    const isAgree = displayText.startsWith('同意→');
    const el = document.createElement('div');
    el.className = 'danmaku' + (isAgree ? ' is-agree' : '');
    el.textContent = displayText;
    el.style.fontSize = '2.2rem';
    if (!isAgree) el.style.color = fgColor;
    // 同意は1.5倍速
    scrollElement(el, pickTrack(), isAgree ? 1.5 : 1);
  }

  client.channel('comments-' + sessionId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments', filter: 'session_id=eq.' + sessionId }, p => {
      if (p.new.is_hidden) return;
      launch(p.new.text, p.new.is_question);
    }).subscribe();

  client.channel('reactions-' + sessionId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reactions', filter: 'session_id=eq.' + sessionId }, p => {
      launchReaction(p.new.type);
    }).subscribe();
}

init();
</script>
</body>
</html>
