<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弾幕ディスプレイ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }
  #screen { width: 100%; height: 100%; position: relative; overflow: hidden; }
  #session-label { position: fixed; top: 18px; left: 24px; z-index: 20; display: flex; flex-direction: column; gap: 4px; }
  #session-name  { font-size: 2.1rem; font-weight: 700; letter-spacing: 0.08em; }
  #event-name    { font-size: 1.5rem; letter-spacing: 0.06em; opacity: 0.5; }
  #stats { position: fixed; top: 18px; right: 24px; z-index: 20; font-size: 0.72rem; opacity: 0.25; letter-spacing: 0.05em; }
  #description-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 10px 24px; background: rgba(0,0,0,0.45);
    font-size: 0.9rem; letter-spacing: 0.05em; opacity: 0.85; display: none;
  }
  #qr-box { position: fixed; bottom: 20px; right: 20px; z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.9; }
  #qr-link { display: block; background: #fff; padding: 8px; border-radius: 8px; cursor: pointer; text-decoration: none; }
  #qr-label { font-size: 0.7rem; letter-spacing: 0.06em; text-align: center; opacity: 0.6; }
  .danmaku { position: absolute; white-space: pre; font-weight: 700; pointer-events: none; will-change: transform; line-height: 1.4; }
  #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 0.9rem; opacity: 0.3; }

  /* スマホ対応 */
  @media (max-width: 600px) {
    #session-name  { font-size: 1.2rem; }
    #event-name    { font-size: 0.9rem; }
    #stats         { font-size: 0.65rem; top: 12px; right: 12px; }
    #session-label { top: 12px; left: 12px; }
    #qr-box        { bottom: 12px; right: 12px; }
    #qr-link canvas, #qr-link img { width: 90px !important; height: 90px !important; }
    #qr-label      { font-size: 0.6rem; }
    #description-bar { font-size: 0.75rem; padding: 8px 12px; }
  }
</style>
</head>
<body>
<div id="screen"></div>
<div id="session-label">
  <span id="session-name"></span>
  <span id="event-name"></span>
</div>
<div id="stats">0 コメント</div>
<div id="description-bar"></div>
<div id="qr-box">
  <a id="qr-link" target="_blank"><div id="qr-canvas"></div></a>
  <div id="qr-label">投稿はこちら</div>
</div>
<div id="loading">読み込み中...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ---- 定数 ----
const SUPABASE_URL  = 'https://izlcztrxwzyqgvbinugd.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bGN6dHJ4d3p5cWd2YmludWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTg3OTYsImV4cCI6MjA5NTk3NDc5Nn0.TTZnwaxJays6p_0tlGUGGHj4zx0cav6-jEsgKdGpPuk';
const TRACKS        = 20;
const BASE_DURATION = 12;

const client    = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const sessionId = new URLSearchParams(window.location.search).get('id') || 'default';

// ---- 文字サイズ計算 ----
function rand(a, b) { return a + Math.random() * (b - a); }
function calcSize(text) {
  const isMobile = window.innerWidth <= 600;
  const scale    = isMobile ? 0.65 : 1;
  const len = text.length;
  let base;
  if (len <= 3)  base = rand(36, 42);
  else if (len <= 8)  base = rand(26, 32);
  else if (len <= 20) base = rand(20, 24);
  else if (len <= 40) base = rand(18, 20);
  else base = 14;
  return Math.floor(base * scale);
}

// ---- 縁取りスタイル生成 ----
function makeTextShadow(color) {
  const c = color || '#000000';
  return `2px 2px 0 ${c}, -2px -2px 0 ${c}, 2px -2px 0 ${c}, -2px 2px 0 ${c}, 0 2px 0 ${c}, 0 -2px 0 ${c}, 2px 0 0 ${c}, -2px 0 0 ${c}`;
}

// ---- 初期化 ----
async function init() {
  const { data } = await client.from('sessions').select('*').eq('id', sessionId).single();
  document.getElementById('loading').style.display = 'none';

  const cfg = {
    session_name: sessionId, event_name: '', description: '',
    bg_color: '#000000', fg_color: '#ffffff', speed: 1,
    text_stroke_color: '#000000', question_color: '#fb923c', agree_color: '#86efac',
    title_color: null, desc_color: null,
    ...(data || {})
  };

  const fgColor     = cfg.fg_color           || '#ffffff';
  const strokeColor = cfg.text_stroke_color  || '#000000';
  const qColor      = cfg.question_color     || '#fb923c';
  const agColor     = cfg.agree_color        || '#86efac';
  const titleColor  = cfg.title_color        || fgColor;
  const descColor   = cfg.desc_color         || fgColor;
  const speed       = parseFloat(cfg.speed)  || 1;

  document.body.style.background = cfg.bg_color || '#000000';

  // セッション名・イベント名
  const sessionNameEl = document.getElementById('session-name');
  sessionNameEl.textContent = cfg.session_name || sessionId;
  sessionNameEl.style.color = titleColor;
  document.getElementById('stats').style.color = fgColor;

  if (cfg.event_name) {
    const el = document.getElementById('event-name');
    el.textContent = cfg.event_name;
    el.style.color = titleColor;
  }

  // ディスクリプション
  if (cfg.description) {
    const bar = document.getElementById('description-bar');
    bar.style.color   = descColor;
    bar.style.display = 'block';
    bar.innerHTML = cfg.description
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  // QR（白背景・黒色固定・クリックで投稿URLへ）
  document.getElementById('qr-label').style.color = fgColor;
  const postUrl = location.href.replace('display.html', 'post.html').replace(/\?.*/, '') + '?id=' + encodeURIComponent(sessionId);
  document.getElementById('qr-link').href = postUrl;
  new QRCode(document.getElementById('qr-canvas'), {
    text: postUrl, width: 180, height: 180,
    colorDark: '#000000', colorLight: '#ffffff'
  });

  startRealtime(sessionId, { fgColor, strokeColor, qColor, agColor, speed });
}

// ---- リアルタイム弾幕 ----
function startRealtime(sessionId, { fgColor, strokeColor, qColor, agColor, speed }) {
  const screen    = document.getElementById('screen');
  const stats     = document.getElementById('stats');
  const isMobile  = window.innerWidth <= 600;
  const trackCount = isMobile ? 10 : TRACKS;
  let count = 0;
  const trackLastEnd = new Array(trackCount).fill(0);

  function getTrackY(i) {
    const topMargin    = isMobile ? 80  : 160;
    const bottomMargin = isMobile ? 120 : 220;
    const usable       = screen.offsetHeight - topMargin - bottomMargin;
    const halfTracks   = trackCount / 2;
    const spacing      = usable / halfTracks;
    const idx          = Math.floor(i / 2);
    const offset       = (i % 2 === 1) ? Math.round(spacing / 2) : 0;
    return topMargin + Math.round(spacing * idx) + offset;
  }

  function pickTrack() {
    let track = 0, earliest = Infinity;
    for (let i = 0; i < trackCount; i++) {
      if (trackLastEnd[i] < earliest) { earliest = trackLastEnd[i]; track = i; }
    }
    return track;
  }

  function scrollElement(el, track, speedMult) {
    document.body.appendChild(el);
    const w = el.offsetWidth;
    document.body.removeChild(el);
    const effectiveSpeed = speed * (speedMult || 1);
    const duration = (BASE_DURATION / effectiveSpeed) + Math.random() * (3 / effectiveSpeed);
    trackLastEnd[track] = Date.now() + duration * 1000;
    el.style.top        = getTrackY(track) + 'px';
    el.style.left       = screen.offsetWidth + 'px';
    el.style.transition = `transform ${duration}s linear`;
    screen.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translateX(${-(screen.offsetWidth + w + 100)}px)`;
    }));
    setTimeout(() => el.remove(), (duration + 1) * 1000);
  }

  function launch(text, isQuestion) {
    const color = isQuestion ? qColor : fgColor;
    const size  = calcSize(text);
    const el    = document.createElement('div');
    el.className    = 'danmaku';
    el.textContent  = (isQuestion ? '❓ ' : '') + text;
    el.style.color      = color;
    el.style.fontSize   = size + 'px';
    el.style.textShadow = makeTextShadow(strokeColor);
    scrollElement(el, pickTrack(), 1);
    count++;
    stats.textContent = count + ' コメント';

    // マイルストーン：100件ごとに大きな文字で流す
    if (count % 100 === 0) {
      setTimeout(() => launchMilestone(count), 500);
    }
  }

  function launchMilestone(n) {
    const text = `🎉 総コメント数 ${n} 件！`;
    const el   = document.createElement('div');
    el.className    = 'danmaku';
    el.textContent  = text;
    el.style.fontSize   = '3.5rem';
    el.style.color      = '#ffe66d';
    el.style.textShadow = makeTextShadow('#000000');
    el.style.zIndex     = '50';
    // 中央トラック付近に流す
    const mid = Math.floor(trackCount / 2);
    scrollElement(el, mid, 0.6); // ゆっくり流す
  }

  async function launchReaction(displayText) {
    const isAgree = displayText.startsWith('同意→');
    if (isAgree) {
      const originalText = displayText.slice(3);
      const { data } = await client.from('comments')
        .select('is_hidden').eq('text', originalText)
        .eq('session_id', sessionId).eq('is_hidden', true).limit(1);
      if (data && data.length > 0) return;
    }
    const size = calcSize(displayText);
    const el   = document.createElement('div');
    el.className    = 'danmaku';
    el.textContent  = displayText;
    el.style.fontSize   = size + 'px';
    el.style.color      = isAgree ? agColor : fgColor;
    el.style.textShadow = makeTextShadow(strokeColor);
    scrollElement(el, pickTrack(), isAgree ? 1.5 : 1);
  }

  // ブロックリストをキャッシュ（起動時＋随時更新）
  let blockedSet = new Set();
  async function loadBlockedUsers() {
    const { data } = await client.from('blocked_users').select('user_id').eq('session_id', sessionId);
    blockedSet = new Set((data || []).map(b => b.user_id));
  }
  await loadBlockedUsers();

  // blocked_usersの変更をリアルタイムで反映
  client.channel('blocked-' + sessionId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'blocked_users', filter: 'session_id=eq.' + sessionId }, async () => {
      await loadBlockedUsers();
    }).subscribe();

  client.channel('comments-' + sessionId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments', filter: 'session_id=eq.' + sessionId }, p => {
      if (p.new.is_hidden) return;
      if (p.new.user_id && blockedSet.has(p.new.user_id)) return;
      launch(p.new.text, p.new.is_question);
    }).subscribe();

  client.channel('reactions-' + sessionId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reactions', filter: 'session_id=eq.' + sessionId }, p => {
      launchReaction(p.new.type);
    }).subscribe();
}

init();
</script>
</body>
</html>
