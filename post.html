<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>コメント投稿</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a; color: #fff; font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px 20px; gap: 20px;
  }
  .header { text-align: center; display: flex; flex-direction: column; gap: 6px; }
  .event-title { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; }
  .page-title  { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: 0.06em; }

  #disabled-screen {
    display: none; text-align: center;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 16px; padding: 32px 24px; max-width: 400px; width: 100%;
  }
  #disabled-screen .icon { font-size: 2.5rem; margin-bottom: 12px; }
  #disabled-screen p { color: #ef4444; font-size: 1rem; font-weight: 700; }
  #disabled-screen small { color: rgba(255,255,255,0.3); font-size: 0.82rem; margin-top: 8px; display: block; }

  #post-content { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; gap: 20px; }

  .card {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px;
  }
  .card label { font-size: 0.8rem; color: rgba(255,255,255,0.45); letter-spacing: 0.05em; }
  textarea {
    width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: #fff; font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.05rem; padding: 12px 14px; resize: none; height: 90px; outline: none; line-height: 1.6;
  }
  textarea:focus { border-color: rgba(255,255,255,0.4); }
  textarea::placeholder { color: rgba(255,255,255,0.25); }
  .counter-row { display: flex; align-items: center; gap: 10px; }
  .progress-track { flex: 1; height: 4px; background: rgba(255,255,255,0.12); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; border-radius: 4px; background: #4f46e5; transition: width 0.1s, background 0.2s; }
  .counter-num { font-size: 0.78rem; color: rgba(255,255,255,0.4); min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }
  .counter-num.warn { color: #f59e0b; }
  .counter-num.over { color: #ef4444; }

  .question-toggle {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; cursor: pointer; user-select: none; transition: background 0.15s, border-color 0.15s;
  }
  .question-toggle.active { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.4); }
  .question-toggle .q-icon { font-size: 1.2rem; }
  .question-toggle .q-text { font-size: 0.9rem; color: rgba(255,255,255,0.6); flex: 1; }
  .question-toggle.active .q-text { color: #fbbf24; font-weight: 700; }
  .question-toggle .q-check {
    width: 20px; height: 20px; border: 1.5px solid rgba(255,255,255,0.25); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 0.75rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .question-toggle.active .q-check { background: #fbbf24; border-color: #fbbf24; color: #000; }

  .send-btn {
    width: 100%; padding: 14px; background: #4f46e5; color: #fff;
    font-family: 'Noto Sans JP', sans-serif; font-size: 1rem; font-weight: 700;
    border: none; border-radius: 10px; cursor: pointer; letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:active { transform: scale(0.97); background: #3730a3; }
  .send-btn:disabled { background: #333; color: rgba(255,255,255,0.3); cursor: default; }

  .reactions-title { font-size: 0.8rem; color: rgba(255,255,255,0.45); letter-spacing: 0.05em; text-align: center; }
  .reactions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
  .react-btn {
    padding: 18px 8px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; color: #fff; font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: background 0.15s, transform 0.1s;
  }
  .react-label { font-size: 0.85rem; color: rgba(255,255,255,0.7); font-weight: 700; text-align: center; }
  .react-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.12); }

  /* コメント履歴 */
  .history-section { width: 100%; }
  .history-toggle {
    width: 100%; padding: 14px 18px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: rgba(255,255,255,0.6); font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    transition: background 0.15s;
  }
  .history-toggle:active { background: rgba(255,255,255,0.08); }
  .history-toggle .arrow { font-size: 0.8rem; transition: transform 0.2s; }
  .history-toggle.open .arrow { transform: rotate(180deg); }

  .history-body { display: none; margin-top: 8px; }
  .history-body.open { display: block; }

  .history-toolbar {
    display: flex; justify-content: flex-end; margin-bottom: 10px;
  }
  .reload-btn {
    padding: 6px 14px; font-size: 0.8rem;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: rgba(255,255,255,0.5); cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: background 0.15s;
  }
  .reload-btn:active { background: rgba(255,255,255,0.12); }

  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .history-item.is-q { border-color: rgba(251,191,36,0.25); background: rgba(251,191,36,0.04); }
  .history-body-text { flex: 1; }
  .history-text { font-size: 0.92rem; line-height: 1.5; white-space: pre-wrap; margin-bottom: 4px; }
  .history-meta { font-size: 0.7rem; color: rgba(255,255,255,0.25); display: flex; align-items: center; gap: 8px; }
  .q-tag { font-size: 0.68rem; padding: 1px 6px; background: rgba(251,191,36,0.15); color: #fbbf24; border-radius: 4px; }

  .agree-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 10px; min-width: 52px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.15s, transform 0.1s; flex-shrink: 0;
  }
  .agree-btn:active { transform: scale(0.93); }
  .agree-btn.agreed { background: rgba(79,70,229,0.2); border-color: rgba(79,70,229,0.5); }
  .agree-icon { font-size: 1.1rem; }
  .agree-count { font-size: 0.72rem; color: rgba(255,255,255,0.45); font-weight: 700; }
  .agree-btn.agreed .agree-count { color: #818cf8; }

  .history-empty { text-align: center; color: rgba(255,255,255,0.25); font-size: 0.85rem; padding: 24px 0; }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); color: #fff;
    padding: 10px 22px; border-radius: 50px; font-size: 0.9rem;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <p class="event-title" id="event-title">読み込み中...</p>
  <p class="page-title">コメントを送ろう</p>
</div>

<div id="disabled-screen">
  <div class="icon">⛔</div>
  <p>無効なセッションです</p>
  <small>このセッションは現在投稿を受け付けていません</small>
</div>

<div id="post-content">
  <div class="card">
    <label>コメント（55文字以内）</label>
    <textarea id="text" placeholder="一言どうぞ..." maxlength="55"></textarea>
    <div class="counter-row">
      <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
      <span class="counter-num" id="counter">0 / 55</span>
    </div>
    <div class="question-toggle" id="q-toggle">
      <span class="q-icon">❓</span>
      <span class="q-text">質問として送る</span>
      <span class="q-check" id="q-check"></span>
    </div>
    <button class="send-btn" id="send-btn">画面に流す 🚀</button>
  </div>

  <p class="reactions-title">リアクションを送る</p>
  <div class="reactions" id="reactions-grid"></div>

  <!-- コメント履歴 -->
  <div class="history-section">
    <button class="history-toggle" id="history-toggle" onclick="toggleHistory()">
      <span>コメント履歴を見る</span>
      <span class="arrow">▼</span>
    </button>
    <div class="history-body" id="history-body">
      <div class="history-toolbar">
        <button class="reload-btn" onclick="loadHistory()">↺ リロード</button>
      </div>
      <div class="history-list" id="history-list">
        <p class="history-empty">読み込み中...</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://izlcztrxwzyqgvbinugd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6bGN6dHJ4d3p5cWd2YmludWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTg3OTYsImV4cCI6MjA5NTk3NDc5Nn0.TTZnwaxJays6p_0tlGUGGHj4zx0cav6-jEsgKdGpPuk';
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params    = new URLSearchParams(window.location.search);
const sessionId = params.get('id') || 'default';

const DEFAULT_REACTIONS = [
  { label: '拍手',    display: '88888888888' },
  { label: '同意',    display: '👍️' },
  { label: '面白い',  display: 'wwwwwwwwwwww' },
  { label: 'なるほど', display: '💡' }
];

// セッション初期化
async function init() {
  const { data } = await client.from('sessions').select('session_name, is_active, reactions').eq('id', sessionId).single();
  if (!data || data.is_active === false) {
    document.getElementById('event-title').textContent = data ? data.session_name : sessionId;
    document.getElementById('disabled-screen').style.display = 'block';
    return;
  }
  document.getElementById('event-title').textContent = data.session_name;
  document.getElementById('post-content').style.display = 'flex';

  const reactions = data.reactions || DEFAULT_REACTIONS;
  const grid = document.getElementById('reactions-grid');
  grid.innerHTML = reactions.map(r => `
    <button class="react-btn" data-display="${escAttr(r.display)}">
      <span class="react-label">${escHtml(r.label)}</span>
    </button>
  `).join('');
  grid.querySelectorAll('.react-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const display = btn.dataset.display;
      await client.from('reactions').insert({ type: display, session_id: sessionId });
      toast(btn.querySelector('.react-label').textContent + ' を送りました！');
    });
  });
}
init();

// コメント入力
const MAX = 55;
const textarea = document.getElementById('text');
const progress = document.getElementById('progress');
const counter  = document.getElementById('counter');
let isQuestion = false;

textarea.addEventListener('input', () => {
  const len = textarea.value.length;
  const pct = Math.min(len / MAX * 100, 100);
  progress.style.width = pct + '%';
  counter.textContent = len + ' / ' + MAX;
  if (pct >= 100) { progress.style.background = '#ef4444'; counter.className = 'counter-num over'; }
  else if (pct >= 80) { progress.style.background = '#f59e0b'; counter.className = 'counter-num warn'; }
  else { progress.style.background = '#4f46e5'; counter.className = 'counter-num'; }
});

const qToggle = document.getElementById('q-toggle');
const qCheck  = document.getElementById('q-check');
qToggle.addEventListener('click', () => {
  isQuestion = !isQuestion;
  qToggle.classList.toggle('active', isQuestion);
  qCheck.textContent = isQuestion ? '✓' : '';
});

document.getElementById('send-btn').addEventListener('click', async () => {
  const text = textarea.value.trim();
  if (!text) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  const { data: check } = await client.from('sessions').select('is_active').eq('id', sessionId).single();
  if (!check || check.is_active === false) {
    document.getElementById('disabled-screen').style.display = 'block';
    document.getElementById('post-content').style.display = 'none';
    return;
  }
  const { error } = await client.from('comments').insert({ text, is_question: isQuestion, session_id: sessionId });
  btn.disabled = false;
  if (error) { toast('エラーが発生しました'); return; }
  textarea.value = '';
  progress.style.width = '0%';
  progress.style.background = '#4f46e5';
  counter.textContent = '0 / 55';
  counter.className = 'counter-num';
  isQuestion = false;
  qToggle.classList.remove('active');
  qCheck.textContent = '';
  toast('送信しました！');
  // 履歴が開いていたらリロード
  if (document.getElementById('history-body').classList.contains('open')) loadHistory();
});

// コメント履歴
let historyLoaded = false;

function toggleHistory() {
  const toggle = document.getElementById('history-toggle');
  const body   = document.getElementById('history-body');
  const isOpen = body.classList.contains('open');
  toggle.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
  if (!isOpen && !historyLoaded) loadHistory();
}

async function loadHistory() {
  historyLoaded = true;
  const list = document.getElementById('history-list');
  list.innerHTML = '<p class="history-empty">読み込み中...</p>';
  const { data, error } = await client
    .from('comments').select('*')
    .eq('session_id', sessionId)
    .eq('is_hidden', false)
    .order('created_at', { ascending: false })
    .limit(50);
  if (error || !data || !data.length) {
    list.innerHTML = '<p class="history-empty">まだコメントはありません</p>';
    return;
  }
  list.innerHTML = data.map(c => {
    const dt = new Date(c.created_at).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    return `
      <div class="history-item ${c.is_question ? 'is-q' : ''}">
        <div class="history-body-text">
          <div class="history-text">${escHtml(c.text)}</div>
          <div class="history-meta">
            ${dt}
            ${c.is_question ? '<span class="q-tag">❓ 質問</span>' : ''}
          </div>
        </div>
        <button class="agree-btn" id="agree-${c.id}" data-id="${c.id}" data-text="${escAttr(c.text)}">
          <span class="agree-icon">👍</span>
          <span class="agree-count" id="agree-count-${c.id}">${c.agree_count || 0}</span>
        </button>
      </div>
    `;
  }).join('');

  // データ属性からイベントリスナーを安全に設定
  list.querySelectorAll('.agree-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      sendAgree(btn.dataset.id, btn.dataset.text);
    });
  });
}

async function sendAgree(commentId, commentText) {
  const btn = document.getElementById('agree-' + commentId);
  if (btn.classList.contains('agreed')) return;
  btn.classList.add('agreed');

  // agree_countをインクリメント
  const { data: cur } = await client.from('comments').select('agree_count').eq('id', commentId).single();
  const newCount = (cur?.agree_count || 0) + 1;
  await client.from('comments').update({ agree_count: newCount }).eq('id', commentId);
  await client.from('comment_agrees').insert({ comment_id: commentId });

  // カウント表示更新
  document.getElementById('agree-count-' + commentId).textContent = newCount;

  // 弾幕として「同意→コメント内容」をreactionsに流す（speed_multiplierで1.5倍速を指示）
  await client.from('reactions').insert({
    type: '同意→' + commentText,
    session_id: sessionId
  });

  toast('同意しました！');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
