<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弾幕管理画面</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f1a; color: #fff; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

  #login-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; padding: 24px;
  }
  #login-screen h1 { font-size: 1.2rem; color: rgba(255,255,255,0.7); letter-spacing: 0.08em; }
  #login-screen input {
    width: 100%; max-width: 320px; padding: 12px 16px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: #fff; font-size: 1rem;
    font-family: 'Noto Sans JP', sans-serif; outline: none; text-align: center; letter-spacing: 0.15em;
  }
  #login-screen button {
    width: 100%; max-width: 320px; padding: 13px;
    background: #4f46e5; color: #fff; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
  }
  #login-err { color: #ef4444; font-size: 0.85rem; }

  #main-screen { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .top-bar h1 { font-size: 1.2rem; letter-spacing: 0.06em; }
  .logout-btn {
    padding: 6px 14px; font-size: 0.8rem;
    background: rgba(239,68,68,0.15); color: #ef4444;
    border: 1px solid rgba(239,68,68,0.4); border-radius: 8px;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: background 0.15s;
  }
  .logout-btn:hover { background: rgba(239,68,68,0.25); }

  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .tab {
    padding: 10px 18px; font-size: 0.9rem; cursor: pointer; color: rgba(255,255,255,0.4);
    border-bottom: 2px solid transparent; font-family: 'Noto Sans JP', sans-serif;
    background: none; border-top: none; border-left: none; border-right: none; transition: color 0.15s;
  }
  .tab.active { color: #fff; border-bottom-color: #4f46e5; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ソートバー */
  .sort-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .sort-btn {
    padding: 5px 12px; font-size: 0.78rem; cursor: pointer;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; color: rgba(255,255,255,0.5);
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .sort-btn:hover { background: rgba(255,255,255,0.1); }
  .sort-btn.active { background: rgba(79,70,229,0.25); border-color: #4f46e5; color: #fff; }
  .sort-btn.today  { background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.4); color: #22c55e; }
  .sort-btn.today.active { background: rgba(34,197,94,0.3); }
  .sort-btn.done   { background: rgba(156,163,175,0.1); border-color: rgba(156,163,175,0.3); color: rgba(255,255,255,0.4); }
  .sort-btn.done.active { background: rgba(156,163,175,0.2); }

  /* セッションカード */
  .session-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .session-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap;
    transition: opacity 0.2s;
  }
  .session-card.inactive   { opacity: 0.5; border-color: rgba(255,255,255,0.06); }
  .session-card.completed  { opacity: 0.35; border-color: rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
  .session-info { flex: 1; min-width: 0; }
  .session-id-badge {
    font-size: 0.72rem; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px;
    color: rgba(255,255,255,0.5); font-family: monospace; margin-bottom: 4px; display: inline-block;
  }
  .session-title { font-size: 1rem; font-weight: 700; }
  .session-sub   { font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .session-date  { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 4px; }
  .session-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }

  .toggle-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .toggle-label { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
  .toggle-switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; border-radius: 12px; background: rgba(255,255,255,0.15); transition: background 0.2s; }
  .toggle-switch input:checked + .toggle-track { background: #22c55e; }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: transform 0.2s; }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(20px); }

  /* 完了トグル専用色 */
  .toggle-completed input:checked + .toggle-track { background: #6b7280; }

  .status-badge { font-size: 0.72rem; padding: 2px 10px; border-radius: 20px; font-weight: 700; }
  .status-badge.on        { background: rgba(34,197,94,0.15);   color: #22c55e; }
  .status-badge.off       { background: rgba(239,68,68,0.15);   color: #ef4444; }
  .status-badge.completed { background: rgba(107,114,128,0.2);  color: #9ca3af; }

  .url-section { margin-top: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px 14px; }
  .url-section p { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-bottom: 5px; letter-spacing: 0.05em; }
  .url-line { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .url-text { font-size: 0.8rem; color: #7df9ff; font-family: monospace; flex: 1; word-break: break-all; }
  .copy-btn {
    padding: 4px 10px; font-size: 0.75rem; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: rgba(255,255,255,0.6);
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap;
  }

  /* フォーム */
  .edit-form {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 20px; margin-bottom: 24px; display: none;
  }
  .edit-form.open { display: block; }
  .form-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: rgba(255,255,255,0.8); }
  .form-section { margin-top: 20px; margin-bottom: 4px; }
  .form-section-title {
    font-size: 0.75rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em;
    padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 14px;
  }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
  .field input[type=text], .field input[type=number], .field input[type=date], .field textarea {
    width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff;
    font-size: 0.95rem; font-family: 'Noto Sans JP', sans-serif; outline: none;
  }
  .field input[type=date] { color-scheme: dark; }
  .field input:focus, .field textarea:focus { border-color: rgba(255,255,255,0.35); }
  .field textarea { resize: vertical; min-height: 60px; }
  .field .hint { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 4px; }
  .field-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .speed-row { display: flex; align-items: center; gap: 12px; }
  .speed-row input[type=range] { flex: 1; accent-color: #4f46e5; }
  .speed-val { font-size: 0.9rem; font-weight: 700; min-width: 36px; text-align: right; }
  .color-row { display: flex; align-items: center; gap: 10px; }
  .color-row input[type=color] { width: 40px; height: 34px; border: none; background: none; cursor: pointer; border-radius: 6px; }

  .reaction-header { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; }
  .reaction-header span { font-size: 0.75rem; color: rgba(255,255,255,0.3); padding: 0 2px; }
  .reaction-editor { display: flex; flex-direction: column; gap: 8px; }
  .reaction-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }
  .reaction-row input {
    padding: 8px 12px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-size: 0.9rem; font-family: 'Noto Sans JP', sans-serif; outline: none; width: 100%;
  }
  .reaction-row input:focus { border-color: rgba(255,255,255,0.35); }
  .del-btn {
    padding: 8px 10px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px; color: #ef4444; cursor: pointer; font-size: 0.9rem;
  }
  .add-reaction-btn {
    padding: 8px 14px; font-size: 0.82rem; background: rgba(255,255,255,0.06);
    border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; color: rgba(255,255,255,0.5);
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; text-align: left; margin-top: 8px;
  }

  .btn {
    padding: 8px 16px; font-size: 0.85rem; font-weight: 700; border-radius: 8px; border: none;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: transform 0.1s; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary   { background: #4f46e5; color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15); }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

  /* コメント管理（セッション内） */
  .session-comment-panel {
    margin-top: 12px; display: none;
    background: rgba(0,0,0,0.25); border-radius: 10px; padding: 14px;
  }
  .session-comment-panel.open { display: block; }
  .comment-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .comment-panel-header h3 { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
  .inline-comment-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .inline-comment-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 10px 12px; }
  .inline-comment-item.is-q      { border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.04); }
  .inline-comment-item.is-hidden { opacity: 0.35; }
  .inline-comment-text { font-size: 0.88rem; line-height: 1.4; white-space: pre-wrap; margin-bottom: 4px; }
  .inline-comment-meta { font-size: 0.68rem; color: rgba(255,255,255,0.25); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  /* コメント管理タブ */
  .session-select-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .session-select-row label { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
  .session-select-row select {
    padding: 8px 12px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; color: #fff; font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; outline: none;
  }
  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; font-size: 0.82rem; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; color: rgba(255,255,255,0.55);
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s;
  }
  .filter-btn.active { background: rgba(79,70,229,0.25); border-color: #4f46e5; color: #fff; }
  .comment-list { display: flex; flex-direction: column; gap: 8px; }
  .comment-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 14px; }
  .comment-item.is-q      { border-color: rgba(251,191,36,0.3);  background: rgba(251,191,36,0.05); }
  .comment-item.is-hidden { opacity: 0.4; }
  .comment-text    { font-size: 0.95rem; line-height: 1.5; margin-bottom: 4px; white-space: pre-wrap; }
  .comment-meta    { font-size: 0.72rem; color: rgba(255,255,255,0.3); }
  .comment-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .q-badge       { font-size: 0.7rem; padding: 2px 8px; background: rgba(251,191,36,0.2);  color: #fbbf24; border-radius: 4px; margin-left: 6px; }
  .agree-badge   { font-size: 0.7rem; padding: 2px 8px; background: rgba(79,70,229,0.15);  color: #818cf8; border-radius: 4px; margin-left: 6px; }
  .hidden-badge  { font-size: 0.7rem; padding: 2px 8px; background: rgba(239,68,68,0.15);  color: #ef4444; border-radius: 4px; margin-left: 6px; }
  .user-id-badge { font-size: 0.68rem; padding: 1px 6px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.35); border-radius: 4px; margin-left: 6px; font-family: monospace; }
  .action-btn {
    padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); transition: all 0.15s;
  }
  .action-btn:hover      { background: rgba(255,255,255,0.12); }
  .action-btn.hide-btn   { border-color: rgba(239,68,68,0.3);  color: #ef4444; background: rgba(239,68,68,0.08); }
  .action-btn.show-btn   { border-color: rgba(34,197,94,0.3);  color: #22c55e; background: rgba(34,197,94,0.08); }
  .action-btn.block-btn  { border-color: rgba(251,191,36,0.3); color: #f59e0b; background: rgba(251,191,36,0.08); }
  .empty { text-align: center; color: rgba(255,255,255,0.25); font-size: 0.9rem; padding: 40px 0; }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); color: #fff; padding: 10px 22px;
    border-radius: 50px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="login-screen">
  <h1>🔐 管理者ログイン</h1>
  <input type="password" id="pw-input" placeholder="パスワードを入力" />
  <button onclick="doLogin()">ログイン</button>
  <p id="login-err"></p>
</div>

<div id="main-screen">
  <div class="top-bar">
    <h1>⚙️ 弾幕管理画面</h1>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('sessions')">セッション管理</button>
    <button class="tab" onclick="switchTab('comments')">コメント管理</button>
  </div>

  <!-- セッション管理 -->
  <div class="panel active" id="panel-sessions">
    <div style="margin-bottom:12px">
      <button class="btn btn-primary" onclick="openNewForm()">＋ 新規セッション作成</button>
    </div>

    <!-- ソートバー -->
    <div class="sort-bar">
      <button class="sort-btn active" onclick="setSort('created_desc',this)">登録順（新しい）</button>
      <button class="sort-btn" onclick="setSort('created_asc',this)">登録順（古い）</button>
      <button class="sort-btn" onclick="setSort('start_desc',this)">開始日（新しい）</button>
      <button class="sort-btn" onclick="setSort('start_asc',this)">開始日（古い）</button>
      <button class="sort-btn today" onclick="setSort('today',this)">📅 本日開始</button>
      <button class="sort-btn done"  onclick="setSort('completed',this)">✅ 完了済み</button>
    </div>

    <!-- 編集フォーム -->
    <div class="edit-form" id="edit-form">
      <p class="form-title" id="form-title">新規セッション作成</p>

      <div class="form-section"><p class="form-section-title">基本設定</p></div>
      <div class="field">
        <label>セッションID（英数字とハイフンのみ・日付は自動付与）</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="f-id" placeholder="koen1 / bunkakai-a" maxlength="30" oninput="updateIdPreview()" style="flex:1" />
          <span style="font-size:0.85rem;color:rgba(255,255,255,0.35);white-space:nowrap" id="f-id-suffix"></span>
        </div>
        <p class="hint" id="f-id-preview">例：koen1 → display.html?id=koen1-250926</p>
        <p style="font-size:0.75rem;color:#ef4444;margin-top:4px;display:none" id="f-id-dup">⚠️ セッションIDが重複しています</p>
      </div>
      <div class="field">
        <label>セッション名（最大100文字）</label>
        <input type="text" id="f-name" placeholder="基調講演" maxlength="100" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>イベント名（任意）</label>
          <input type="text" id="f-event" placeholder="友の会サミット2026" />
        </div>
        <div class="field">
          <label>開始日（任意）</label>
          <input type="date" id="f-start-date" />
        </div>
      </div>
      <div class="field">
        <label>ディスクリプション（登壇者名など・下部に表示）</label>
        <textarea id="f-desc" placeholder="登壇：齋藤 一郎 / 路上博物館"></textarea>
      </div>

      <div class="form-section"><p class="form-section-title">表示設定</p></div>
      <div class="field">
        <label>背景画像（JPEG・WebP、最大2MB）</label>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input type="file" id="f-bg-image" accept="image/jpeg,image/webp"
            style="font-size:0.85rem;color:rgba(255,255,255,0.6)" onchange="previewBgImage()" />
          <button class="btn btn-secondary btn-sm" type="button" onclick="clearBgImage()">削除</button>
        </div>
        <div id="f-bg-image-preview" style="margin-top:8px;display:none">
          <img id="f-bg-image-thumb" style="width:120px;height:68px;object-fit:cover;border-radius:6px;border:1px solid rgba(255,255,255,0.15)" />
          <p style="font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:4px" id="f-bg-image-name"></p>
        </div>
        <p class="hint">設定中の画像：<span id="f-bg-image-current">なし</span></p>
      </div>
      <div class="field-row">
        <div class="field">
          <label>背景色（画像なしの場合に使用）</label>
          <div class="color-row">
            <input type="color" id="f-bg-picker" value="#000000" oninput="document.getElementById('f-bg').value=this.value" />
            <input type="text" id="f-bg" value="#000000" oninput="syncPickerFromText('f-bg')" />
          </div>
        </div>
        <div class="field">
          <label>文字色（通常）</label>
          <div class="color-row">
            <input type="color" id="f-fg-picker" value="#ffffff" oninput="document.getElementById('f-fg').value=this.value" />
            <input type="text" id="f-fg" value="#ffffff" oninput="syncPickerFromText('f-fg')" />
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>タイトル文字色（省略可）</label>
          <div class="color-row">
            <input type="color" id="f-title-color-picker" value="#ffffff" oninput="document.getElementById('f-title-color').value=this.value" />
            <input type="text" id="f-title-color" placeholder="#ffffff（省略可）" oninput="syncPickerFromText('f-title-color')" />
          </div>
        </div>
        <div class="field">
          <label>ディスクリプション文字色（省略可）</label>
          <div class="color-row">
            <input type="color" id="f-desc-color-picker" value="#ffffff" oninput="document.getElementById('f-desc-color').value=this.value" />
            <input type="text" id="f-desc-color" placeholder="#ffffff（省略可）" oninput="syncPickerFromText('f-desc-color')" />
          </div>
        </div>
      </div>

      <div class="form-section"><p class="form-section-title">詳細設定</p></div>
      <div class="field-row-3">
        <div class="field">
          <label>縁取り色</label>
          <div class="color-row">
            <input type="color" id="f-stroke-picker" value="#000000" oninput="document.getElementById('f-stroke').value=this.value" />
            <input type="text" id="f-stroke" value="#000000" oninput="syncPickerFromText('f-stroke')" />
          </div>
        </div>
        <div class="field">
          <label>質問コメント色</label>
          <div class="color-row">

function validateImageFile(file) {
  const allowed = ['image/jpeg', 'image/webp'];
  if (!allowed.includes(file.type)) return { ok: false, msg: 'JPEG・WebPのみ対応しています' };
  if (file.size > 2 * 1024 * 1024) return { ok: false, msg: '画像は2MB以下にしてください' };

}

  const reader = new FileReader();
  reader.onload = e => {

    document.getElementById('f-bg-image-name').textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + 'KB)';

  const dd  = String(now.getDate()).padStart(2, '0');
  return yy + mm + dd;
}

function switchTab(name) {
  const names = ['sessions', 'comments'];

// ---- ソート ----
function setSort(type, btn) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSessions();
}

function sortedSessions() {
  const today = todayStr();
  let list = [...sessions];
  switch (currentSort) {
    case 'created_desc': list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)); break;
    case 'created_asc':  list.sort((a,b) => new Date(a.created_at) - new Date(b.created_at)); break;
    case 'start_desc':   list.sort((a,b) => (b.start_date||'') > (a.start_date||'') ? 1 : -1); break;
    case 'start_asc':    list.sort((a,b) => (a.start_date||'') > (b.start_date||'') ? 1 : -1); break;
    case 'today':        list = list.filter(s => s.start_date === today); break;
    case 'completed':    list = list.filter(s => s.is_completed); break;
  }
  // 完了済みを末尾に（today/completedフィルタ以外）
  if (!['today','completed'].includes(currentSort)) {
    list.sort((a, b) => (a.is_completed ? 1 : 0) - (b.is_completed ? 1 : 0));
  }
  return list;
}

async function toggleSession(id, isActive) {
  const { error } = await client.from('sessions').update({ is_active: isActive }).eq('id', id);
  if (error) { showToast('更新エラー'); return; }
  const s = sessions.find(s => s.id === id);
  if (s) s.is_active = isActive;
  renderSessions();
  showToast(isActive ? '✅ ONにしました' : '⛔ OFFにしました');
}

async function toggleCompleted(id, isCompleted) {
  const { error } = await client.from('sessions').update({ is_completed: isCompleted }).eq('id', id);
  if (error) { showToast('更新エラー'); return; }
  const s = sessions.find(s => s.id === id);
  if (s) s.is_completed = isCompleted;
  renderSessions();
  showToast(isCompleted ? '✅ 完了にしました' : '↩️ 完了を解除しました');
}

// ---- セッション内コメント管理 ----
const sessionCommentCache = {};

async function toggleSessionComments(sessionId) {
  const panel = document.getElementById('scp-' + sessionId);
  const isOpen = panel.classList.contains('open');
  if (isOpen) { panel.classList.remove('open'); return; }
  panel.classList.add('open');
  panel.innerHTML = '<p style="font-size:0.8rem;color:rgba(255,255,255,0.3);padding:8px 0">読み込み中...</p>';
  await loadSessionComments(sessionId);
}

async function loadSessionComments(sid) {
  const panel = document.getElementById('scp-' + sid);
  const [{ data: comments }, { data: blocked }] = await Promise.all([
    client.from('comments').select('*').eq('session_id', sid).order('created_at', { ascending: false }),
    client.from('blocked_users').select('user_id').eq('session_id', sid)
  ]);
  const blockedSet = new Set((blocked || []).map(b => b.user_id));
  const list = comments || [];

  panel.innerHTML = `
    <div class="comment-panel-header">
      <h3>💬 コメント（${list.length}件）</h3>
      <div style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="exportSessionCSV('${sid}','all')">CSV全件</button>
        <button class="btn btn-secondary btn-sm" onclick="exportSessionCSV('${sid}','question')">CSV質問</button>
        <button class="btn btn-secondary btn-sm" onclick="loadSessionComments('${sid}')">更新</button>
      </div>
    </div>
    <div class="inline-comment-list">
      ${list.length === 0 ? '<p style="font-size:0.8rem;color:rgba(255,255,255,0.25);padding:12px 0;text-align:center">コメントはまだありません</p>' :
        list.map(c => {
          const dt = new Date(c.created_at).toLocaleString('ja-JP');
          const isBlocked = c.user_id && blockedSet.has(c.user_id);
          return `
          <div class="inline-comment-item ${c.is_question ? 'is-q' : ''} ${c.is_hidden ? 'is-hidden' : ''}">
            <div class="inline-comment-text">${escHtml(c.text)}</div>
            <div class="inline-comment-meta">
              <span>${dt}</span>
              ${c.is_question ? '<span class="q-badge">❓</span>' : ''}
              ${c.agree_count ? `<span class="agree-badge">👍${c.agree_count}</span>` : ''}
              ${c.is_hidden   ? '<span class="hidden-badge">非表示</span>' : ''}
              ${isBlocked     ? '<span class="hidden-badge">ブロック中</span>' : ''}
              <span style="display:flex;gap:4px;margin-left:auto">
                ${c.is_hidden
                  ? `<button class="action-btn show-btn" onclick="scToggleHidden('${c.id}',false,'${sid}')">表示</button>`
                  : `<button class="action-btn hide-btn" onclick="scToggleHidden('${c.id}',true,'${sid}')">非表示</button>`}
                ${c.user_id ? (isBlocked
                  ? `<button class="action-btn show-btn" onclick="scToggleBlock('${c.user_id}','${sid}',false)">ブロック解除</button>`
                  : `<button class="action-btn block-btn" onclick="scToggleBlock('${c.user_id}','${sid}',true)">ブロック</button>`) : ''}
              </span>
            </div>
          </div>`;
        }).join('')}
    </div>`;
  sessionCommentCache[sid] = { list, blockedSet };
}

async function scToggleHidden(id, hide, sid) {
  const { error } = await client.from('comments').update({ is_hidden: hide }).eq('id', id);
  if (error) { showToast('更新エラー'); return; }
  showToast(hide ? '🚫 非表示にしました' : '✅ 表示に戻しました');
  await loadSessionComments(sid);
}

async function scToggleBlock(userId, sid, block) {
  if (block) {
    await client.from('blocked_users').insert({ session_id: sid, user_id: userId });
  } else {
    await client.from('blocked_users').delete().eq('session_id', sid).eq('user_id', userId);
  }
  showToast(block ? '🚫 ブロックしました' : '✅ ブロック解除しました');
  await loadSessionComments(sid);
}

async function exportSessionCSV(sid, mode) {
  const { data } = await client.from('comments').select('*').eq('session_id', sid).order('created_at', { ascending: false });
  const filtered = mode === 'question' ? (data||[]).filter(c => c.is_question) : (data||[]);
  if (!filtered.length) { showToast('データがありません'); return; }
  const rows = [['投稿時刻','コメント','質問フラグ','同意数']];
  filtered.forEach(c => rows.push([
    new Date(c.created_at).toLocaleString('ja-JP'),
    '"' + c.text.replace(/"/g,'""') + '"',
    c.is_question ? '質問' : '',
    c.agree_count || 0
  ]));
  const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `danmaku_${sid}_${mode === 'question' ? 'questions_' : ''}${todayStr()}.csv`;
  a.click();
  showToast('CSVをダウンロードしました');
}

  }
  setColorField('f-bg',    s.bg_color           || '#000000');
  setColorField('f-fg',    s.fg_color           || '#ffffff');
  setColorField('f-stroke',s.text_stroke_color  || '#000000');
  setColorField('f-q-color',    s.question_color || '#fb923c');
  setColorField('f-agree-color',s.agree_color    || '#86efac');
  document.getElementById('f-title-color').value = s.title_color || '';
  document.getElementById('f-desc-color').value  = s.desc_color  || '';
  document.getElementById('f-speed').value = s.speed || 1;
  document.getElementById('f-speed-val').textContent = (s.speed || 1) + 'x';
  document.getElementById('f-max-chars').value = s.max_chars || 55;
  document.getElementById('reaction-editor').innerHTML = '';
  (s.reactions || DEFAULT_REACTIONS).forEach(r => addReactionRow(r.label, r.display));
  document.getElementById('edit-form').classList.add('open');
  document.getElementById('edit-form').scrollIntoView({ behavior: 'smooth' });
}

function closeForm() { document.getElementById('edit-form').classList.remove('open'); }

async function saveSession() {
  const rawId    = document.getElementById('f-id').value.trim().replace(/[^a-zA-Z0-9\-_]/g, '');
  const id       = editingId ? rawId : rawId + '-' + getDateSuffix();
  const name     = document.getElementById('f-name').value.trim()  || '基調講演';
  const event    = document.getElementById('f-event').value.trim();
  const desc     = document.getElementById('f-desc').value.trim();
  const startDate = document.getElementById('f-start-date').value || null;
  const bg       = document.getElementById('f-bg').value;
  const fg       = document.getElementById('f-fg').value;
  const stroke   = document.getElementById('f-stroke').value;
  const qColor   = document.getElementById('f-q-color').value;
  const agColor  = document.getElementById('f-agree-color').value;
  const tColor   = document.getElementById('f-title-color').value.trim() || null;
  const dColor   = document.getElementById('f-desc-color').value.trim()  || null;
  const speed    = parseFloat(document.getElementById('f-speed').value);
  const maxChars = parseInt(document.getElementById('f-max-chars').value) || 55;
  const reactions = getReactionsFromForm();

  if (!id)               { showToast('セッションIDを入力してください'); return; }
  if (!reactions.length) { showToast('リアクションボタンを1つ以上設定してください'); return; }
  // 新規作成時の重複チェック
  if (!editingId && sessions.some(s => s.id === id)) {
    document.getElementById('f-id-dup').style.display = 'block';
    showToast('セッションIDが重複しています');
    return;
  }

  // 背景画像のアップロード
  let bgImageUrl = currentBgImageUrl;
  const bgFile = document.getElementById('f-bg-image').files[0];
  if (bgFile) {
    const validated = validateImageFile(bgFile);
    if (!validated.ok) { showToast(validated.msg); return; }
    // 旧画像を削除
    if (currentBgImageUrl) {
      const oldPath = currentBgImageUrl.split('/bg-images/')[1];
      if (oldPath) await client.storage.from('bg-images').remove([decodeURIComponent(oldPath)]);
    }
    const ext      = bgFile.type === 'image/webp' ? 'webp' : 'jpg';
    const filename = crypto.randomUUID() + '.' + ext;
    const { data: uploadData, error: uploadErr } = await client.storage.from('bg-images').upload(filename, bgFile, { contentType: bgFile.type });
    if (uploadErr) { showToast('画像のアップロードに失敗しました'); return; }
    const { data: urlData } = client.storage.from('bg-images').getPublicUrl(filename);
    bgImageUrl = urlData.publicUrl;
  } else if (currentBgImageUrl === null && editingId) {
    // 削除ボタンで明示的にnullにした場合
    const s = sessions.find(x => x.id === editingId);
    if (s?.bg_image_url) {
      const oldPath = s.bg_image_url.split('/bg-images/')[1];
      if (oldPath) await client.storage.from('bg-images').remove([decodeURIComponent(oldPath)]);
    }
    bgImageUrl = null;
  }

  const payload = {
    session_name: name, event_name: event, description: desc, start_date: startDate,
    bg_color: bg, fg_color: fg, text_stroke_color: stroke,
    question_color: qColor, agree_color: agColor,
    title_color: tColor, desc_color: dColor,
    speed, max_chars: maxChars, reactions,
    bg_image_url: bgImageUrl
  };
  const { error } = editingId
    ? await client.from('sessions').update(payload).eq('id', editingId)
    : await client.from('sessions').insert({ id, ...payload, is_active: true, is_completed: false });

  if (error) { showToast('保存エラー: ' + error.message); return; }
  showToast('保存しました！');
  closeForm();
  loadSessions();
}

// ---- コメント管理タブ ----
function populateSessionSelect() {
  const sel = document.getElementById('comment-session-select');
  // 開始日新しい順で並べる
  const sorted = [...sessions].sort((a,b) => (b.start_date||b.created_at) > (a.start_date||a.created_at) ? 1 : -1);
  sel.innerHTML = '<option value="">選択してください</option>' +
    sorted.map(s => `<option value="${escHtml(s.id)}">${escHtml(s.session_name)}（${escHtml(s.id)}）${s.start_date ? ' ' + s.start_date : ''}</option>`).join('');
}

async function loadComments() {
  const sid = document.getElementById('comment-session-select').value;
  if (!sid) return;
  const [{ data }, { data: blocked }] = await Promise.all([
    client.from('comments').select('*').eq('session_id', sid).order('created_at', { ascending: false }),
    client.from('blocked_users').select('user_id').eq('session_id', sid)
  ]);
  allComments   = data || [];
  blockedUserIds = new Set((blocked || []).map(b => b.user_id));
  renderComments();
}

function filterComments(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderComments();
}

async function toggleHidden(id, hide) {
  const { error } = await client.from('comments').update({ is_hidden: hide }).eq('id', id);
  if (error) { showToast('更新エラー'); return; }
  const c = allComments.find(c => c.id === id);
  if (c) c.is_hidden = hide;
  renderComments();
  showToast(hide ? '🚫 非表示にしました' : '✅ 表示に戻しました');
}

async function toggleBlock(userId, sid, block) {
  if (block) {
    const { error } = await client.from('blocked_users').insert({ session_id: sid, user_id: userId });
    if (error && !error.message.includes('duplicate')) { showToast('ブロックエラー'); return; }
    blockedUserIds.add(userId);
  } else {
    await client.from('blocked_users').delete().eq('session_id', sid).eq('user_id', userId);
    blockedUserIds.delete(userId);
  }
  renderComments();
  showToast(block ? '🚫 ユーザーをブロックしました' : '✅ ブロックを解除しました');
}

function renderComments() {
  const list = document.getElementById('comment-list');
  const filtered = currentFilter === 'question' ? allComments.filter(c => c.is_question)
                 : currentFilter === 'hidden'   ? allComments.filter(c => c.is_hidden)
                 : allComments;
  if (!filtered.length) { list.innerHTML = '<p class="empty">コメントはまだありません</p>'; return; }
  list.innerHTML = filtered.map(c => `
    <div class="comment-item ${c.is_question ? 'is-q' : ''} ${c.is_hidden ? 'is-hidden' : ''}">
      <div class="comment-text">${escHtml(c.text)}</div>
      <div class="comment-meta">
        ${new Date(c.created_at).toLocaleString('ja-JP')}
        ${c.is_question ? '<span class="q-badge">❓ 質問</span>' : ''}
        ${c.agree_count ? `<span class="agree-badge">👍 ${c.agree_count}</span>` : ''}
        ${c.is_hidden   ? '<span class="hidden-badge">🚫 非表示</span>' : ''}
        ${c.user_id     ? `<span class="user-id-badge">${c.user_id}</span>` : ''}
        ${c.user_id && blockedUserIds.has(c.user_id) ? '<span class="hidden-badge">🚫 ブロック中</span>' : ''}
      </div>
      <div class="comment-actions">
        ${c.is_hidden
          ? `<button class="action-btn show-btn" onclick="toggleHidden('${c.id}',false)">✅ 表示に戻す</button>`
          : `<button class="action-btn hide-btn" onclick="toggleHidden('${c.id}',true)">🚫 非表示にする</button>`}
        ${c.user_id ? (blockedUserIds.has(c.user_id)
          ? `<button class="action-btn show-btn" onclick="toggleBlock('${c.user_id}','${c.session_id}',false)">🔓 ブロック解除</button>`
          : `<button class="action-btn block-btn" onclick="toggleBlock('${c.user_id}','${c.session_id}',true)">🚫 ユーザーブロック</button>`) : ''}
      </div>
    </div>`).join('');
}

function exportCSV(mode) {
  const data = mode === 'question' ? allComments.filter(c => c.is_question) : allComments;
  if (!data.length) { showToast('データがありません'); return; }
  const rows = [['投稿時刻', 'コメント', '質問フラグ', '同意数']];
  data.forEach(c => rows.push([
    new Date(c.created_at).toLocaleString('ja-JP'),
    '"' + c.text.replace(/"/g, '""') + '"',
    c.is_question ? '質問' : '',
    c.agree_count || 0
  ]));
  const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = 'danmaku_' + (mode === 'question' ? 'questions_' : '') + todayStr() + '.csv';
  a.click();
  showToast('CSVをダウンロードしました');
}
